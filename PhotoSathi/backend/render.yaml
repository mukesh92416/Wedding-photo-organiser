services:
  - type: web
    name: photosathi-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
    healthCheckPath: /api/stats
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
